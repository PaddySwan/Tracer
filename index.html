<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracer — Daily Maze</title>
  <meta name="description" content="Six mazes. One clock. A new set of daily mazes every day — trace your path through all six as fast as you can.">
  <meta property="og:title" content="Tracer — Daily Maze">
  <meta property="og:description" content="Six mazes. One clock. A new set of daily mazes every day — trace your path through all six as fast as you can.">
  <meta property="og:image" content="https://tracer.swansonux.com/assets/og-image.png">
  <meta property="og:url" content="https://tracer.swansonux.com">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="styles.css?v=51">
</head>
<body>
  <div id="app">
    <!-- Landing Screen -->
    <section id="landing" class="screen active">
      <h1 class="logo">Tracer</h1>
      <p class="tagline">Six mazes. One clock.</p>
      <p id="day-number" class="day-number"></p>
      <p id="landing-greeting" class="holiday-greeting hidden"></p>
      <button id="btn-start" class="btn-primary">Start Today's Run</button>
      <div class="landing-actions-row">
        <button id="btn-practice" class="btn-secondary">Practice</button>
        <button id="btn-history" class="btn-icon-secondary" aria-label="Play history"></button>
      </div>
      <p class="hint">Arrow keys, WASD, or click and drag · New mazes daily</p>
      <p id="rollover-hint" class="rollover-hint"></p>
      <p id="revision" class="revision"></p>
    </section>

    <!-- Gameplay Screen -->
    <section id="gameplay" class="screen">
      <header class="game-header">
        <span class="logo-small">Tracer</span>
        <span id="maze-label">Maze 1 / 6</span>
        <span id="timer">0:00.00</span>
        <button id="btn-exit-practice" class="btn-exit-practice hidden">Exit</button>
      </header>
      <div id="countdown-overlay" class="countdown-overlay hidden">
        <span id="countdown-number">3</span>
      </div>
      <div id="maze-container">
        <canvas id="maze-canvas" aria-label="Maze game board"></canvas>
      </div>
      <div id="maze-clear-overlay" class="maze-clear-overlay hidden">
        <span class="maze-clear-text">Maze Clear</span>
        <span id="split-time" class="split-time"></span>
      </div>
      <div class="game-toolbar">
        <button id="btn-mute" class="btn-mute" aria-label="Toggle sound"></button>
      </div>
      <footer id="splits-footer" class="splits-footer"></footer>
    </section>

    <!-- Results Screen -->
    <section id="results" class="screen">
      <h1 class="results-title">Run Complete</h1>
      <p id="results-day-number" class="day-number"></p>
      <p id="results-greeting" class="holiday-greeting hidden"></p>
      <p id="total-time" class="total-time">Total — 0:00.00</p>
      <div id="recap-panels" class="recap-panels"></div>
      <div id="splits-list" class="splits-list"></div>
      <div class="results-actions">
        <button id="btn-copy" class="btn-secondary">Copy Result</button>
        <button id="btn-share" class="btn-secondary">Copy Image</button>
        <button id="btn-home" class="btn-secondary">Home</button>
      </div>
    </section>

    <!-- Recap expand overlay (results screen) -->
    <div id="recap-expand-overlay" class="recap-expand-overlay hidden" aria-hidden="true">
      <div class="recap-expand-content">
        <div class="recap-expand-header">
          <span id="recap-expand-title">Maze 1</span>
          <span id="recap-expand-split" class="recap-expand-split"></span>
          <button type="button" class="recap-expand-close" aria-label="Close">×</button>
        </div>
        <canvas id="recap-expand-canvas" aria-label="Expanded maze view"></canvas>
      </div>
    </div>

    <!-- History overlay -->
    <div id="history-overlay" class="history-overlay hidden" aria-hidden="true">
      <div class="history-content">
        <div class="history-header">
          <span id="history-title" class="history-title"></span>
          <button type="button" class="recap-expand-close" aria-label="Close">×</button>
        </div>
        <div id="history-grid" class="history-grid-wrap"></div>
        <div class="history-key">
          <span class="history-key-label">Faster</span>
          <div class="history-key-swatches">
            <div style="background:#22c55e"></div>
            <div style="background:#84cc16"></div>
            <div style="background:#eab308"></div>
            <div style="background:#f97316"></div>
            <div style="background:#ef4444"></div>
          </div>
          <span class="history-key-label">Slower</span>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <img src="assets/swan_logo.png" alt="Patrick Swanson" class="footer-logo">
    <span>© 2026 Patrick Swanson</span>
  </footer>

  <script type="module" src="app.js?v=51"></script>
</body>
</html>
